<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Layer Composer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column;
    overflow: hidden;
  }

  /* Toolbar */
  #toolbar {
    display: flex; align-items: center; gap: 12px; padding: 10px 20px;
    background: #16213e; border-bottom: 1px solid #0f3460; flex-shrink: 0;
  }
  #toolbar label { font-size: 14px; color: #aaa; }
  #toolbar select {
    padding: 6px 12px; font-size: 14px; background: #0f3460; color: #eee;
    border: 1px solid #533483; border-radius: 6px; min-width: 180px; outline: none;
  }
  #toolbar button {
    padding: 6px 16px; font-size: 13px; border: none; border-radius: 6px;
    cursor: pointer; font-weight: 600; transition: background 0.15s;
  }
  .btn-secondary { background: #0f3460; color: #ccc; }
  .btn-secondary:hover { background: #1a4a7a; }
  .btn-primary { background: #533483; color: #eee; }
  .btn-primary:hover { background: #6a4c93; }
  .btn-export { background: #e94560; color: #fff; margin-left: auto; }
  .btn-export:hover { background: #f0627a; }
  #info-text { font-size: 12px; color: #888; margin-left: 8px; }

  /* Main */
  #main { display: flex; flex: 1; overflow: hidden; }

  /* Left panel */
  #left-panel {
    width: 390px; min-width: 390px; overflow-y: auto; overflow-x: hidden;
    background: #1a1a2e; border-right: 1px solid #0f3460; padding: 10px;
  }
  #grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .layer-item {
    background: #16213e; border-radius: 8px; padding: 5px;
    text-align: center; cursor: pointer; border: 2px solid transparent;
    transition: border-color 0.15s, opacity 0.15s; user-select: none;
  }
  .layer-item:hover { border-color: #3a3a6e; }
  .layer-item.on { border-color: #533483; }
  .layer-item.off { opacity: 0.35; }
  .layer-item.dragging { opacity: 0.4; transform: scale(0.95); }
  .layer-item.drag-over { border-color: #e94560; box-shadow: 0 0 8px rgba(233,69,96,0.4); }
  .layer-item .thumb-wrap {
    position: relative; width: 100%; aspect-ratio: 1;
    background: repeating-conic-gradient(#333 0% 25%, #2a2a2a 0% 50%) 50% / 14px 14px;
    border-radius: 4px; overflow: hidden; display: flex; align-items: center; justify-content: center;
  }
  .layer-item .thumb-wrap img {
    max-width: 100%; max-height: 100%; object-fit: contain; display: block;
  }
  .layer-item .filename {
    font-size: 9.5px; color: #aaa; margin: 3px 0 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .layer-item .controls {
    display: flex; align-items: center; justify-content: center; gap: 3px; margin-top: 1px;
  }
  .layer-item .order-badge {
    display: inline-block; font-size: 9px; color: #888; background: #0f3460;
    border-radius: 3px; padding: 0 4px; line-height: 16px; min-width: 22px; text-align: center;
  }
  .layer-item .arrow-btn {
    width: 18px; height: 18px; padding: 0; border: 1px solid #333;
    background: #1a1a3e; color: #aaa; border-radius: 3px;
    font-size: 12px; line-height: 1; cursor: pointer; display: inline-flex;
    align-items: center; justify-content: center; flex-shrink: 0;
    transition: background 0.1s, color 0.1s;
  }
  .layer-item .arrow-btn:hover { background: #533483; color: #fff; border-color: #533483; }
  .layer-item .arrow-btn:disabled { opacity: 0.2; cursor: default; }
  .layer-item .arrow-btn:disabled:hover { background: #1a1a3e; color: #aaa; border-color: #333; }
  .layer-item input[type="checkbox"] {
    width: 15px; height: 15px; cursor: pointer; accent-color: #533483;
    flex-shrink: 0;
  }

  /* Right panel */
  #right-panel {
    flex: 1; display: flex; align-items: center; justify-content: center;
    background: #12121f; padding: 20px; overflow: auto;
  }
  #preview-wrap {
    position: relative; max-width: 100%; max-height: 100%;
    background: repeating-conic-gradient(#333 0% 25%, #2a2a2a 0% 50%) 50% / 20px 20px;
    border-radius: 8px; box-shadow: 0 4px 30px rgba(0,0,0,0.6);
  }
  #preview {
    display: block; max-width: 100%; max-height: calc(100vh - 140px);
    border-radius: 8px; image-rendering: auto;
  }

  /* Loading overlay */
  #loading {
    display: none; position: absolute; inset: 0;
    background: rgba(0,0,0,0.6); border-radius: 8px;
    align-items: center; justify-content: center; flex-direction: column; gap: 12px;
  }
  #loading.show { display: flex; }
  .spinner {
    width: 36px; height: 36px; border: 3px solid #3a3a6e;
    border-top-color: #e94560; border-radius: 50%; animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading-text { font-size: 13px; color: #aaa; }

  /* Scrollbar */
  #left-panel::-webkit-scrollbar { width: 6px; }
  #left-panel::-webkit-scrollbar-track { background: transparent; }
  #left-panel::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

  /* Empty state */
  .empty-state { text-align: center; padding: 40px 20px; color: #666; }
  .empty-state p { margin-top: 8px; font-size: 13px; }
</style>
</head>
<body>

<div id="toolbar">
  <label for="folder-select" data-i18n="folderLabel">Folder:</label>
  <select id="folder-select"><option value="" data-i18n="selectPlaceholder">-- Select --</option></select>
  <button id="btn-all-on" class="btn-secondary" data-i18n="selectAll">Select All</button>
  <button id="btn-all-off" class="btn-secondary" data-i18n="deselectAll">Deselect All</button>
  <button id="btn-reset-order" class="btn-secondary" data-i18n="resetOrder">Reset Order</button>
  <span id="info-text"></span>
  <button id="btn-export" class="btn-export" data-i18n="exportPng">Export PNG</button>
  <button id="btn-lang" class="btn-secondary" style="margin-left:auto">中文</button>
</div>

<div id="main">
  <div id="left-panel">
    <div id="grid"><div class="empty-state"><p class="empty-msg">Select a folder to begin</p></div></div>
  </div>
  <div id="right-panel">
    <div id="preview-wrap">
      <canvas id="preview" style="display:none"></canvas>
      <div id="loading"><div class="spinner"></div><span id="loading-text">Loading...</span></div>
    </div>
  </div>
</div>

<script>
(function() {
  const select = document.getElementById('folder-select');
  const grid = document.getElementById('grid');
  const canvas = document.getElementById('preview');
  const loading = document.getElementById('loading');
  const loadingText = document.getElementById('loading-text');
  const infoText = document.getElementById('info-text');
  const previewWrap = document.getElementById('preview-wrap');

  // ---- i18n ----
  const L = {
    en: {
      folderLabel: 'Folder:',
      selectPlaceholder: '-- Select --',
      selectAll: 'Select All',
      deselectAll: 'Deselect All',
      resetOrder: 'Reset Order',
      exportPng: 'Export PNG',
      loading: 'Loading...',
      loadingProgress: 'Loading... {n}/{total}',
      emptyFolder: 'No PNG images in this folder',
      emptyDefault: 'Select a folder to begin',
      loadFailed: 'Load failed',
      tooltip: ' (layer: {idx}, drag to reorder)',
      layers: '{enabled}/{total} layers',
    },
    zh: {
      folderLabel: '角色:',
      selectPlaceholder: '-- 选择文件夹 --',
      selectAll: '全选',
      deselectAll: '取消全选',
      resetOrder: '重置顺序',
      exportPng: '导出 PNG',
      loading: '加载中...',
      loadingProgress: '加载中... {n}/{total}',
      emptyFolder: '该文件夹没有 PNG 图片',
      emptyDefault: '选择角色文件夹加载素材',
      loadFailed: '加载失败',
      tooltip: ' (层级: {idx}, 拖拽可排序)',
      layers: '{enabled}/{total} 层',
    }
  };
  let lang = 'en';
  function t(key, vars) {
    let s = L[lang][key] || key;
    if (vars) for (const k in vars) s = s.replace('{' + k + '}', vars[k]);
    return s;
  }
  function setLang(l) {
    lang = l;
    document.querySelectorAll('[data-i18n]').forEach(el => {
      el.textContent = L[lang][el.dataset.i18n] || el.textContent;
    });
    document.getElementById('btn-lang').textContent = lang === 'en' ? '中文' : 'EN';
    if (state.sortedNames.length > 0) { buildGrid(); updateInfo(); }
    else {
      // Update empty state message
      const empty = grid.querySelector('.empty-msg');
      if (empty) empty.textContent = t('emptyDefault');
    }
  }

  const state = {
    folder: null,
    images: new Map(),       // filename -> HTMLImageElement
    enabled: new Set(),      // enabled filenames
    sortedNames: [],         // filenames sorted by pixel count (desc)
    canvasWidth: 0,
    canvasHeight: 0,
  };

  // ---- Count opaque pixels (for auto-sorting layers) ----
  function countOpaquePixels(img) {
    const w = img.naturalWidth, h = img.naturalHeight;
    const c = document.createElement('canvas');
    c.width = w; c.height = h;
    const ctx = c.getContext('2d');
    ctx.drawImage(img, 0, 0);
    const data = ctx.getImageData(0, 0, w, h).data;
    let count = 0;
    for (let i = 3; i < data.length; i += 4) {
      if (data[i] > 0) count++;
    }
    return count;
  }

  function sortByPixelCount(files) {
    const counts = new Map();
    for (const f of files) {
      const img = state.images.get(f);
      counts.set(f, img ? countOpaquePixels(img) : 0);
    }
    files.sort((a, b) => {
      const ca = counts.get(a) || 0, cb = counts.get(b) || 0;
      if (ca !== cb) return cb - ca;  // more pixels = drawn first (bottom)
      return a.localeCompare(b);
    });
  }

  function imgUrl(folder, file) {
    return encodeURIComponent(folder) + '/' + encodeURIComponent(file);
  }

  // ---- Load folder list ----
  async function loadFolders() {
    const res = await fetch('/api/folders');
    const folders = await res.json();
    select.innerHTML = '<option value="" data-i18n="selectPlaceholder">' + t('selectPlaceholder') + '</option>';
    for (const f of folders) {
      const opt = document.createElement('option');
      opt.value = f;
      opt.textContent = f;
      select.appendChild(opt);
    }
    if (folders.length > 0) {
      select.value = folders[0];
      await loadFolder(folders[0]);
    }
  }

  // ---- Load images for a folder ----
  async function loadFolder(folder) {
    state.folder = folder;
    state.images.clear();
    state.enabled.clear();
    state.sortedNames = [];
    showLoading(true, t('loading'));

    const res = await fetch('/api/images?folder=' + encodeURIComponent(folder));
    const files = await res.json();

    if (files.length === 0) {
      grid.innerHTML = '<div class="empty-state"><p>' + t('emptyFolder') + '</p></div>';
      hidePreview();
      showLoading(false);
      return;
    }

    state.sortedNames = files;

    // Preload all images
    let loaded = 0;
    const total = files.length;
    loadingText.textContent = t('loadingProgress', {n: 0, total});

    const loadPromises = files.map(f => {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          loaded++;
          loadingText.textContent = t('loadingProgress', {n: loaded, total});
          state.images.set(f, img);
          resolve();
        };
        img.onerror = () => {
          loaded++;
          loadingText.textContent = t('loadingProgress', {n: loaded, total});
          resolve();
        };
        img.src = imgUrl(folder, f);
      });
    });

    await Promise.all(loadPromises);

    // Sort by opaque pixel count (more pixels = bottom layer)
    sortByPixelCount(state.sortedNames);

    // Default: enable all successfully loaded images
    for (const f of files) {
      if (state.images.has(f)) state.enabled.add(f);
    }

    // Determine canvas size
    let maxW = 0, maxH = 0;
    for (const img of state.images.values()) {
      if (img.naturalWidth > maxW) maxW = img.naturalWidth;
      if (img.naturalHeight > maxH) maxH = img.naturalHeight;
    }
    state.canvasWidth = maxW || 800;
    state.canvasHeight = maxH || 600;

    canvas.width = state.canvasWidth;
    canvas.height = state.canvasHeight;

    buildGrid();
    renderPreview();
    showLoading(false);
    updateInfo();
  }

  // ---- Drag state ----
  let dragIdx = -1;

  // ---- Build thumbnail grid ----
  function buildGrid() {
    grid.innerHTML = '';
    const sorted = state.sortedNames;
    const total = sorted.length;

    sorted.forEach((name, idx) => {
      const img = state.images.get(name);
      const enabled = state.enabled.has(name);

      const item = document.createElement('div');
      item.className = 'layer-item ' + (enabled ? 'on' : 'off');
      item.title = name + t('tooltip', {idx});
      item.draggable = true;
      item.innerHTML = ''
        + '<div class="thumb-wrap">'
        + (img ? '<img src="' + img.src + '" alt="">' : '<span style="font-size:11px;color:#666">' + t('loadFailed') + '</span>')
        + '</div>'
        + '<div class="filename">' + escapeHtml(name) + '</div>'
        + '<div class="controls">'
        + '<span class="order-badge">' + idx + '</span>'
        + '<button class="arrow-btn up" ' + (idx === 0 ? 'disabled' : '') + '>&#9650;</button>'
        + '<button class="arrow-btn down" ' + (idx === total - 1 ? 'disabled' : '') + '>&#9660;</button>'
        + '<input type="checkbox" ' + (enabled ? 'checked' : '') + '>'
        + '</div>';

      const checkbox = item.querySelector('input[type="checkbox"]');
      checkbox.addEventListener('change', (e) => {
        e.stopPropagation();
        if (checkbox.checked) state.enabled.add(name);
        else state.enabled.delete(name);
        item.classList.toggle('on', checkbox.checked);
        item.classList.toggle('off', !checkbox.checked);
        renderPreview();
        updateInfo();
      });

      // Arrow buttons
      item.querySelector('.arrow-btn.up').addEventListener('click', (e) => {
        e.stopPropagation();
        moveUp(idx);
      });
      item.querySelector('.arrow-btn.down').addEventListener('click', (e) => {
        e.stopPropagation();
        moveDown(idx);
      });

      // ---- Drag and drop ----
      item.addEventListener('dragstart', (e) => {
        dragIdx = idx;
        item.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', String(idx));
      });

      item.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        if (idx !== dragIdx) {
          item.classList.add('drag-over');
        }
      });

      item.addEventListener('dragleave', () => {
        item.classList.remove('drag-over');
      });

      item.addEventListener('drop', (e) => {
        e.preventDefault();
        item.classList.remove('drag-over');
        if (dragIdx >= 0 && dragIdx !== idx) {
          const arr = state.sortedNames;
          [arr[dragIdx], arr[idx]] = [arr[idx], arr[dragIdx]];
          buildGrid();
          renderPreview();
        }
        dragIdx = -1;
      });

      item.addEventListener('dragend', () => {
        item.classList.remove('dragging');
        // Clean up any remaining drag-over classes
        grid.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
        dragIdx = -1;
      });

      // Click to toggle
      item.addEventListener('click', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return;
        checkbox.checked = !checkbox.checked;
        checkbox.dispatchEvent(new Event('change'));
      });

      grid.appendChild(item);
    });
  }

  // ---- Reorder ----
  function moveUp(idx) {
    if (idx <= 0) return;
    const arr = state.sortedNames;
    [arr[idx - 1], arr[idx]] = [arr[idx], arr[idx - 1]];
    buildGrid();
    renderPreview();
  }

  function moveDown(idx) {
    if (idx >= state.sortedNames.length - 1) return;
    const arr = state.sortedNames;
    [arr[idx], arr[idx + 1]] = [arr[idx + 1], arr[idx]];
    buildGrid();
    renderPreview();
  }

  function resetOrder() {
    sortByPixelCount(state.sortedNames);
    buildGrid();
    renderPreview();
  }

  // ---- Render preview ----
  function renderPreview() {
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (const name of state.sortedNames) {
      if (!state.enabled.has(name)) continue;
      const img = state.images.get(name);
      if (!img) continue;
      ctx.drawImage(img, 0, 0);
    }

    canvas.style.display = 'block';
  }

  function hidePreview() {
    canvas.style.display = 'none';
  }

  function updateInfo() {
    const enabled = state.enabled.size;
    const total = state.sortedNames.length;
    infoText.textContent = t('layers', {enabled, total});
  }

  function showLoading(show, text) {
    loading.classList.toggle('show', show);
    if (text) loadingText.textContent = text;
  }

  function escapeHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // ---- Export ----
  function exportPNG() {
    if (!state.folder || state.canvasWidth === 0) return;

    // Render to a fresh canvas at full resolution
    const exportCanvas = document.createElement('canvas');
    exportCanvas.width = state.canvasWidth;
    exportCanvas.height = state.canvasHeight;
    const ctx = exportCanvas.getContext('2d');

    for (const name of state.sortedNames) {
      if (!state.enabled.has(name)) continue;
      const img = state.images.get(name);
      if (!img) continue;
      ctx.drawImage(img, 0, 0);
    }

    exportCanvas.toBlob(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = (state.folder || 'character') + '_composite.png';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }, 'image/png');
  }

  // ---- Select all / deselect all ----
  function setAll(enable) {
    if (enable) {
      for (const name of state.sortedNames) {
        if (state.images.has(name)) state.enabled.add(name);
      }
    } else {
      state.enabled.clear();
    }
    buildGrid();
    renderPreview();
    updateInfo();
  }

  // ---- Event bindings ----
  select.addEventListener('change', () => {
    const folder = select.value;
    if (folder) loadFolder(folder);
    else {
      grid.innerHTML = '<div class="empty-state"><p>' + t('emptyDefault') + '</p></div>';
      hidePreview();
      state.folder = null;
      state.images.clear();
      state.enabled.clear();
      updateInfo();
    }
  });

  document.getElementById('btn-all-on').addEventListener('click', () => setAll(true));
  document.getElementById('btn-all-off').addEventListener('click', () => setAll(false));
  document.getElementById('btn-reset-order').addEventListener('click', resetOrder);
  document.getElementById('btn-export').addEventListener('click', exportPNG);
  document.getElementById('btn-lang').addEventListener('click', () => setLang(lang === 'en' ? 'zh' : 'en'));

  // Keyboard shortcut: Ctrl+E to export
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'e') {
      e.preventDefault();
      exportPNG();
    }
  });

  // Init
  loadFolders();
})();
</script>
</body>
</html>
